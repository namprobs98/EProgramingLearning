services:
  mysql:
    image: mysql:8.0
    container_name: eprogramming-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: eprog123
      MYSQL_DATABASE: eprogramming_learning
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-peprog123"]
      interval: 5s
      timeout: 5s
      retries: 10
