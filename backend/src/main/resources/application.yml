server:
  port: 8080

spring:
  profiles:
    active: mysql,local
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./backend/.env[.properties]
  application:
    name: eprogramming-learning
  jpa:
    show-sql: false
    open-in-view: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

app:
  frontend-url: http://localhost:3000
  mail:
    mock: ${MAIL_MOCK:false}
    allow-test-endpoint: true
  jwt:
    secret: ${JWT_SECRET:ChangeThisSecretKeyToAtLeast32CharactersLong!}
    expiration-ms: 86400000
  verification:
    expiry-minutes: 15
