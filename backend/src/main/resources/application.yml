server:
  port: 8080

spring:
  application:
    name: eprogramming-learning
  datasource:
    url: jdbc:mysql://localhost:3306/eprogramming_learning?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:ChangeThisSecretKeyToAtLeast32CharactersLong!}
    expiration-ms: 86400000
  verification:
    expiry-minutes: 15
